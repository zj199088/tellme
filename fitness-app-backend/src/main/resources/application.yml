spring:
  application:
    name: fitness-app
  datasource:
    url: jdbc:sqlite:fitness_app.db
    driver-class-name: org.sqlite.JDBC
  redis:
    host: localhost
    port: 6379
    password:
    database: 0
  security:
    jwt:
      secret: your-secret-key
      expiration: 86400

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.fitness.app.entity
  configuration:
    map-underscore-to-camel-case: true

server:
  port: 8080
  servlet:
    context-path: /api